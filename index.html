  const GID_PRODUCTOS  = "488240662";    // Liquidación 60% = lista maestra (Tags + Sublinea)
  const GID_PROD_EXTRA = "911640390";    // Liquidación 30% (transitoria; al eliminarla, deja "")
  const GID_PRECIOS    = "1086284473";   // Precio
  const GID_INVENTARIO = "1787664807";   // Inventario actual
  const GID_FOTOS      = "0";            // Hoja 1
  const GID_BASE       = "2071290547";   // Hoja "Base" (inventario inicial)

  const COL_PRECIO    = "Oferta Costa 1";
  const COL_DESCUENTO = "Dcto Costa 1";

  const COL_TIENDA    = "Nombre 1";
  const COL_NOMBRE    = "Nombre";

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --rojo:#C8102E; --rojo-osc:#9A0D24; --rojo-soft:#FEF2F4;
    --bg:#FBFBF9; --surface:#FFFFFF; --texto:#26272B; --muted:#8A8F98; --border:#ECECEA;
    --high:#15803D; --high-bg:#ECFDF3; --low:#B45309; --low-bg:#FFF7ED;
    --r:10px; --r-sm:8px;
    --shadow:0 1px 3px rgba(20,20,30,.06); --shadow-lg:0 8px 24px rgba(20,20,30,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden}
  body{font-family:'Inter','Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--texto);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;letter-spacing:-.1px}

  header{background:linear-gradient(110deg,var(--rojo),var(--rojo-osc));padding:18px 20px;display:flex;justify-content:center}
  .head-in{max-width:1280px;width:100%;display:flex;align-items:center;gap:16px}
  .logo{width:60px;height:60px;border-radius:16px;background:#fff;color:var(--rojo);font-weight:800;font-size:1.7rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.18);flex:none}
  .head-txt h1{color:#fff;font-size:1.6rem;font-weight:700;letter-spacing:-.4px}
  .head-txt p{color:rgba(255,255,255,.85);font-size:.92rem;margin-top:1px}

  .wrap{max-width:1280px;margin:0 auto;padding:0 20px 40px}
  .stats{display:flex;gap:10px;margin:18px 0 0;flex-wrap:wrap}
  .stat{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px}
  .stat b{display:block;font-size:1.45rem;font-weight:700;color:var(--texto);line-height:1.1;letter-spacing:-.5px}
  .stat span{font-size:.72rem;color:var(--muted);font-weight:500}

  .stickybar{position:sticky;top:0;z-index:20;background:var(--bg);padding-top:14px;margin-top:14px}
  .navtabs{display:flex;gap:30px;border-bottom:1px solid var(--border);margin-bottom:14px;flex-wrap:wrap}
  .navtab{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:12px 2px;font-size:.98rem;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px;transition:.15s}
  .navtab .num{color:#C9CDD3;font-weight:600}
  .navtab:hover{color:var(--texto)}
  .navtab.activo{color:var(--rojo);border-bottom-color:var(--rojo)}
  .navtab.activo .num{color:var(--rojo)}
  @media(max-width:600px){ .navtabs{gap:18px} .navtab{font-size:.88rem} }

  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px}
  .toolbar[hidden]{display:none}
  .tb-search{flex:1;min-width:160px;max-width:340px;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:.88rem;font-family:inherit;background:#fff;color:var(--texto)}
  .tb-search:focus{outline:none;border-color:var(--rojo);box-shadow:0 0 0 3px var(--rojo-soft)}
  .chip-wrap{position:relative}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--border);border-radius:20px;background:#fff;font-size:.85rem;font-weight:500;font-family:inherit;color:var(--texto);cursor:pointer}
  .chip:hover{border-color:var(--rojo)}
  .chip.activo{border-color:var(--rojo);color:var(--rojo);background:var(--rojo-soft)}
  .chip-n{background:var(--rojo);color:#fff;border-radius:10px;font-size:.7rem;font-weight:600;padding:1px 6px;display:none}
  .chip.activo .chip-n{display:inline}
  .pop{position:absolute;z-index:40;top:calc(100% + 8px);left:0;width:260px;max-width:86vw;max-height:340px;overflow:auto;background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);padding:10px}
  .pop[hidden]{display:none}
  .pop .txt{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:.85rem;font-family:inherit;margin-bottom:6px}
  .pop .txt:focus{outline:none;border-color:var(--rojo);box-shadow:0 0 0 3px var(--rojo-soft)}
  .checklist{display:flex;flex-direction:column;gap:1px}
  .checklist label{display:flex;align-items:center;gap:9px;padding:7px 6px;border-radius:6px;font-size:.85rem;cursor:pointer}
  .checklist label:hover{background:var(--bg)}
  .checklist input{width:16px;height:16px;accent-color:var(--rojo);flex:none}
  .pop-acc{display:flex;justify-content:space-between;gap:8px;border-top:1px solid var(--border);margin-top:8px;padding-top:8px;position:sticky;bottom:0;background:#fff}
  .pop-acc button{border:none;background:none;color:var(--muted);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;padding:7px 8px;border-radius:6px}
  .pop-acc .prim{background:var(--rojo);color:#fff;padding:7px 18px}
  .tb-sel{padding:8px 12px;border:1px solid var(--border);border-radius:20px;background:#fff;font-size:.85rem;font-family:inherit;color:var(--texto);cursor:pointer}
  .tb-sel:focus{outline:none;border-color:var(--rojo);box-shadow:0 0 0 3px var(--rojo-soft)}
  .spacer{flex:1}

  .conteo{font-size:.85rem;color:var(--muted);margin:12px 0}
  .conteo[hidden]{display:none}
  .conteo b{color:var(--texto);font-weight:600}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(208px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;transition:.15s}
  .card:hover{box-shadow:var(--shadow)}
  .card .foto{position:relative;aspect-ratio:1/1;background:#f6f6f4;overflow:hidden}
  .card .foto img{width:100%;height:100%;object-fit:cover;display:block}
  .badge{position:absolute;top:8px;left:8px;background:var(--rojo);color:#fff;font-weight:600;font-size:.78rem;padding:3px 8px;border-radius:6px}
  .card .info{padding:11px 12px;display:flex;flex-direction:column;gap:5px;flex:1}
  .card .nombre{font-weight:600;font-size:.9rem;line-height:1.3}
  .card .sub{font-size:.7rem;color:var(--muted)}
  .card .ref{font-size:.7rem;color:var(--muted)}
  .tagrow{display:flex;flex-wrap:wrap;gap:4px}
  .tag{background:#EEF1F4;color:#475569;font-size:.66rem;font-weight:600;padding:2px 7px;border-radius:5px}
  .precios{margin-top:auto;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .antes{color:var(--muted);text-decoration:line-through;font-size:.8rem}
  .ahora{color:var(--rojo);font-weight:700;font-size:1.05rem}
  .verloc{display:flex;justify-content:space-between;align-items:center;gap:6px;font-size:.76rem;color:var(--muted);border:none;border-top:1px solid var(--border);padding:8px 0 0;margin-top:3px;cursor:pointer;background:none;width:100%;font-family:inherit;text-align:left}
  .verloc:hover{color:var(--rojo)}
  .verloc .pill{padding:1px 8px;border-radius:6px;font-weight:600;font-size:.72rem}
  .pill.high{background:var(--high-bg);color:var(--high)}
  .pill.low{background:var(--low-bg);color:var(--low)}
  .pill.zero{background:#f3f4f6;color:var(--muted)}
  .card-loc{border-top:1px dashed var(--border);margin-top:8px;padding-top:8px;display:flex;flex-direction:column;gap:5px}
  .card-loc[hidden]{display:none}
  .card-loc .l{display:flex;justify-content:space-between;font-size:.76rem}
  .card-loc .l span:first-child{color:var(--muted)}
  .card-loc .l b{font-weight:600}

  /* Seguimiento */
  .seg-sum{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .seg-card{flex:1;min-width:150px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
  .seg-card b{display:block;font-size:1.5rem;font-weight:700;letter-spacing:-.5px}
  .seg-card span{font-size:.72rem;color:var(--muted)}
  .seg-hint{font-size:.78rem;color:var(--muted);margin:0 2px 8px}
  table.seg{border-collapse:separate;border-spacing:0;width:100%;font-size:.86rem;background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
  table.seg th,table.seg td{padding:11px 12px;border-bottom:1px solid var(--border);text-align:right}
  table.seg th:first-child,table.seg td:first-child{text-align:left}
  table.seg thead th{background:#fff;color:var(--muted);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.3px}
  table.seg tfoot td{font-weight:700;border-top:2px solid var(--rojo);background:#FFF7F8}
  table.seg tbody tr.seg-row{cursor:pointer}
  table.seg tbody tr.seg-row:hover td{background:var(--rojo-soft)}
  .seg .caret{display:inline-block;transition:transform .15s;margin-right:8px;color:var(--muted);font-size:.8rem}
  table.seg tbody tr.seg-row.abierto .caret{transform:rotate(90deg);color:var(--rojo)}
  table.seg tbody tr.seg-det>td{background:#FAFAF8;padding:0}
  table.subt{width:100%;border-collapse:collapse;font-size:.82rem}
  table.subt th,table.subt td{padding:9px 16px;border-bottom:1px solid var(--border);text-align:right}
  table.subt th:first-child,table.subt td:first-child{text-align:left;color:var(--texto)}
  table.subt thead th{color:var(--muted);font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.3px;background:#F4F4F1}
  table.subt tbody tr:last-child td{border-bottom:none}
  .seg-empty{padding:14px 16px;color:var(--muted)}
  .bar{position:relative;height:8px;background:#EEF1F4;border-radius:5px;overflow:hidden;min-width:90px;display:inline-block;vertical-align:middle}
  .bar>i{position:absolute;left:0;top:0;bottom:0;background:var(--high);border-radius:5px}
  .bar.mini{min-width:60px;height:6px}
  .pctxt{font-weight:600;margin-left:8px}
  .seg-info{background:#fff;border:1px dashed var(--border);border-radius:var(--r);padding:24px;color:var(--muted);text-align:center;line-height:1.6}
  .seg-info b{color:var(--texto)}

  .pagination{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:16px;flex-wrap:wrap}
  .pagination[hidden]{display:none}
  .page-btn{background:#fff;border:1px solid var(--border);padding:8px 16px;border-radius:var(--r-sm);font-family:inherit;font-size:13px;font-weight:500;color:var(--texto);cursor:pointer}
  .page-btn:hover:not(:disabled){border-color:var(--rojo);color:var(--rojo)}
  .page-btn:disabled{opacity:.35;cursor:not-allowed}
  .page-info{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:12.5px;color:var(--muted)}
  .page-range b{color:var(--texto);font-weight:600}
  .page-jump{display:flex;align-items:center;gap:6px}
  .page-input{width:56px;padding:5px 7px;border:1px solid var(--border);border-radius:var(--r-sm);font-family:inherit;font-size:13px;text-align:center}

  .estado{text-align:center;padding:46px 20px;color:var(--muted)}
  footer{text-align:center;padding:24px;color:var(--muted);font-size:.78rem}
  @media(max-width:600px){ .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px} .head-txt h1{font-size:1.3rem} }
</style>
</head>
<body>
<header>
  <div class="head-in">
    <div class="logo" id="logo">D</div>
    <div class="head-txt"><h1>Liquidación Decora</h1><p>Catálogo y disponibilidad por tienda</p></div>
  </div>
</header>
<div class="wrap">
  <div class="stats">
    <div class="stat"><b id="stProd">—</b><span>Productos</span></div>
    <div class="stat"><b id="stTie">—</b><span>Almacenes</span></div>
    <div class="stat"><b id="stUni">—</b><span>Unidades en stock</span></div>
  </div>

  <div class="stickybar">
    <div class="navtabs">
      <button class="navtab" id="secSeg" onclick="cambiarSeccion('seguimiento')"><span class="num">1</span> Seguimiento de evacuación</button>
      <button class="navtab activo" id="secProd" onclick="cambiarSeccion('productos')"><span class="num">2</span> Detalle de producto</button>
    </div>
    <div class="toolbar" id="toolbar">
      <input id="buscar" class="tb-search" type="text" placeholder="Buscar producto... (ej: blanco bombillo)">
      <div class="chip-wrap">
        <button class="chip" id="chipTag" onclick="abrirChip(event,'tag')">Tags <span class="chip-n" id="nTag"></span> ▾</button>
        <div class="pop" id="popTag" hidden onclick="event.stopPropagation()">
          <input class="txt" id="tagSearch" type="text" placeholder="Filtrar tag..." oninput="filtrarTag()">
          <div class="checklist" id="tagLista"></div>
          <div class="pop-acc"><button onclick="limpiarTag()">Limpiar</button><button class="prim" onclick="cerrarPops()">Listo</button></div>
        </div>
      </div>
      <div class="chip-wrap">
        <button class="chip" id="chipSub" onclick="abrirChip(event,'sub')">Sublínea <span class="chip-n" id="nSub"></span> ▾</button>
        <div class="pop" id="popSub" hidden onclick="event.stopPropagation()">
          <input class="txt" id="subSearch" type="text" placeholder="Filtrar sublínea..." oninput="filtrarSub()">
          <div class="checklist" id="subLista"></div>
          <div class="pop-acc"><button onclick="limpiarSub()">Limpiar</button><button class="prim" onclick="cerrarPops()">Listo</button></div>
        </div>
      </div>
      <div class="chip-wrap">
        <button class="chip" id="chipAlm" onclick="abrirChip(event,'alm')">Almacén <span class="chip-n" id="nAlm"></span> ▾</button>
        <div class="pop" id="popAlm" hidden onclick="event.stopPropagation()">
          <input class="txt" id="msSearch" type="text" placeholder="Filtrar almacén..." oninput="filtrarMS()">
          <div class="checklist" id="msLista"></div>
          <div class="pop-acc"><button onclick="limpiarMS()">Limpiar</button><button class="prim" onclick="cerrarPops()">Listo</button></div>
        </div>
      </div>
      <select id="orden" class="tb-sel" onchange="cambiarOrden(this.value)">
        <option value="">Ordenar por…</option>
        <option value="inv-desc">Inventario: mayor a menor</option>
        <option value="inv-asc">Inventario: menor a mayor</option>
        <option value="precio-desc">Precio: mayor a menor</option>
        <option value="precio-asc">Precio: menor a mayor</option>
        <option value="dcto-desc">% Descuento: mayor a menor</option>
      </select>
    </div>
  </div>

  <div class="conteo" id="conteo">—</div>
  <div id="contenido"></div>
  <div id="estado" class="estado">Cargando productos…</div>
  <nav class="pagination" id="paginacion" hidden>
    <button class="page-btn" id="pgPrev" onclick="irAPagina(pagina-1)">‹ Anterior</button>

      <span class="page-range" id="pgRango"></span>
      <span class="page-jump">Página <input class="page-input" id="pgInput" type="number" min="1" value="1" onchange="irAPagina(parseInt(this.value)||1)"> de <b id="pgTotal">1</b></span>

</div>

<script>
let TODOS=[], ALMACENES=[], SUBLINEAS=[], ALLTAGS=[];
let SELEC=new Set(), SELSUB=new Set(), SELTAG=new Set();
let seccion='productos', pagina=1, orden='';
let INVACT={}, INVBASE={}, BASE_OK=false;
const PAGE_SIZE=36;
const IMG_GENERICA='data:image/svg+xml;utf8,'+encodeURIComponent(
 "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'>"+
 "<rect width='400' height='400' fill='#FBEDEA'/>"+
 "<circle cx='200' cy='180' r='130' fill='#F7D8D1'/>"+
 "<path d='M152 110 L248 110 L232 168 L168 168 Z' fill='#C8102E'/>"+
 "<rect x='196' y='168' width='8' height='96' rx='2' fill='#9A0D24'/>"+
 "<ellipse cx='200' cy='268' rx='46' ry='13' fill='#9A0D24'/>"+
 "<path d='M280 252 L322 252 L314 292 L288 292 Z' fill='#B45309'/>"+
 "<text x='200' y='338' text-anchor='middle' font-family='Arial,sans-serif' font-size='24' fill='#9A0D24' font-weight='bold'>DECORA</text>"+
 "<text x='200' y='366' text-anchor='middle' font-family='Arial,sans-serif' font-size='15' fill='#B45309'>Articulo sin foto</text>"+
 "</svg>");
window.IMG_GEN=IMG_GENERICA;

function num(v){ if(v==null) return 0; const n=parseFloat(String(v).replace(/[^0-9.,-]/g,'').replace(/\./g,'').replace(',','.')); return isNaN(n)?0:n; }
function pesos(v){ return v ? '$'+Math.round(v).toLocaleString('es-CO') : ''; }
function miles(v){ return Math.round(v||0).toLocaleString('es-CO'); }
function codigo(v){ return String(v||'').trim().toUpperCase(); }
function descPct(d){ if(d>0&&d<=1) return Math.round(d*100); return Math.round(d); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function normaliza(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }
function singular(w){ if(w.length>4 && /es$/.test(w)) return w.slice(0,-2); if(w.length>3 && /s$/.test(w)) return w.slice(0,-1); return w; }
function textoBusq(p){ return normaliza(p.nombre+' '+p.codigo+' '+p.sublinea+' '+p.tags.join(' ')).split(/\s+/).map(singular).join(' '); }
function coincide(p,q){ if(!q) return true; const toks=normaliza(q).split(/\s+/).filter(Boolean).map(singular); return toks.every(t=>p.busq.indexOf(t)>=0); }
function campo(fila){ const nombres=Array.prototype.slice.call(arguments,1); const claves=Object.keys(fila); const limpio=s=>String(s).trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); for(const n of nombres){ const k=claves.find(c=>limpio(c)===limpio(n)); if(k!=null&&fila[k]!=null&&String(fila[k]).trim()!=='') return String(fila[k]).trim(); } return ''; }
function urlFoto(valor){ if(!valor||/sin\s*foto/i.test(valor)) return IMG_GENERICA; if(/^https?:\/\//i.test(valor)) return valor; return 'fotos/'+valor; }
function leerTab(gid){ if(!gid) return Promise.resolve({rows:[],code:null}); return new Promise((resolve)=>{ Papa.parse(urlCSV(gid),{download:true,header:true,skipEmptyLines:true,complete:(r)=>resolve({rows:r.data,code:(r.meta.fields&&r.meta.fields[0])||null}),error:()=>resolve({rows:[],code:null})}); }); }
function clasePill(q){ return q<=0?'zero':(q<=3?'low':'high'); }

function invVisible(p){ const sel=[...SELEC]; if(!sel.length) return {total:p.inv,n:Object.keys(p.tiendas).filter(t=>p.tiendas[t]>0).length}; let total=0,n=0; sel.forEach(t=>{const q=p.tiendas[t]||0; if(q>0){total+=q;n++;}}); return {total,n}; }
function tiendasDe(p){ let ent=Object.entries(p.tiendas).filter(e=>e[1]>0); if(SELEC.size) ent=ent.filter(e=>SELEC.has(e[0])); return ent.sort((a,b)=>b[1]-a[1]); }

function tagsHTML(p){ return p.tags.length?'<div class="tagrow">'+p.tags.map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div>':''; }
function locHTML(p){ const ent=tiendasDe(p); if(!ent.length) return '<div class="card-loc" hidden><div class="l"><span>Sin stock en la selección</span></div></div>'; return '<div class="card-loc" hidden>'+ent.map(e=>'<div class="l"><span>'+esc(e[0])+'</span><b>'+miles(e[1])+'</b></div>').join('')+'</div>'; }
function tarjeta(p){
  const iv=invVisible(p);
  const etiqueta=iv.n?(iv.n+(iv.n===1?' almacén':' almacenes')):'Sin stock';
  return '<div class="card"><div class="foto">'+(p.desc?'<span class="badge">-'+p.desc+'%</span>':'')+
    '<img src="'+esc(p.foto)+'" alt="'+esc(p.nombre)+'" loading="lazy" onerror="this.onerror=null;this.src=window.IMG_GEN"></div>'+
    '<div class="info"><div class="nombre">'+esc(p.nombre)+'</div>'+
    (p.sublinea?'<div class="sub">'+esc(p.sublinea)+'</div>':'')+
    tagsHTML(p)+
    (p.codigo?'<div class="ref">Cód: '+esc(p.codigo)+'</div>':'')+
    '<div class="precios">'+(p.antes?'<span class="antes">'+pesos(p.antes)+'</span>':'')+'<span class="ahora">'+(pesos(p.ahora)||'—')+'</span></div>'+
    '<button class="verloc" onclick="toggleLoc(this)"><span>📍 '+esc(etiqueta)+'</span><span class="pill '+clasePill(iv.total)+'">'+iv.total+' und ▾</span></button>'+
    locHTML(p)+'</div></div>';
}
function toggleLoc(btn){ const d=btn.nextElementSibling; if(d&&d.classList.contains('card-loc')) d.hidden=!d.hidden; }

// ---- chips ----
function abrirChip(e,which){ e.stopPropagation(); const m={tag:'popTag',sub:'popSub',alm:'popAlm'}; Object.values(m).forEach(id=>{ if(id!==m[which]) document.getElementById(id).hidden=true; }); const pop=document.getElementById(m[which]); pop.hidden=!pop.hidden; }
function cerrarPops(){ ['popTag','popSub','popAlm'].forEach(id=>document.getElementById(id).hidden=true); }
function updateChips(){
  const set=(chip,nEl,n)=>{ document.getElementById(nEl).textContent=n; document.getElementById(chip).classList.toggle('activo',n>0); };
  set('chipTag','nTag',SELTAG.size); set('chipSub','nSub',SELSUB.size); set('chipAlm','nAlm',SELEC.size);
}
function mkList(cont,arr,fn){ document.getElementById(cont).innerHTML=arr.map(v=>'<label><input type="checkbox" value="'+esc(v)+'" onchange="'+fn+'(this.value,this.checked)">'+esc(v)+'</label>').join(''); }
function filtList(cont,inp){ const q=document.getElementById(inp).value.toLowerCase().trim(); document.querySelectorAll('#'+cont+' label').forEach(l=>{ l.style.display=l.textContent.toLowerCase().includes(q)?'flex':'none'; }); }
function onCheck(t,c){ if(c)SELEC.add(t); else SELEC.delete(t); updateChips(); pagina=1; pintar(); }
function limpiarMS(){ SELEC.clear(); document.querySelectorAll('#msLista input').forEach(c=>c.checked=false); updateChips(); pagina=1; pintar(); }
function filtrarMS(){ filtList('msLista','msSearch'); }
function onCheckSub(s,c){ if(c)SELSUB.add(s); else SELSUB.delete(s); updateChips(); pagina=1; pintar(); }
function limpiarSub(){ SELSUB.clear(); document.querySelectorAll('#subLista input').forEach(c=>c.checked=false); updateChips(); pagina=1; pintar(); }
function filtrarSub(){ filtList('subLista','subSearch'); }
function onCheckTag(t,c){ if(c)SELTAG.add(t); else SELTAG.delete(t); updateChips(); pagina=1; pintar(); }
function limpiarTag(){ SELTAG.clear(); document.querySelectorAll('#tagLista input').forEach(c=>c.checked=false); updateChips(); pagina=1; pintar(); }
function filtrarTag(){ filtList('tagLista','tagSearch'); }

function filtrar(){
  const q=document.getElementById('buscar').value.trim();
  const sel=[...SELEC];
  let lista=TODOS.slice();
  if(SELTAG.size) lista=lista.filter(p=>p.tags.some(t=>SELTAG.has(t)));
  if(SELSUB.size) lista=lista.filter(p=>SELSUB.has(p.sublinea));
  if(sel.length) lista=lista.filter(p=>sel.some(t=>(p.tiendas[t]||0)>0));
  if(q) lista=lista.filter(p=>coincide(p,q));
  if(orden){
    const inv=p=>invVisible(p).total;
    const cmp={'inv-desc':(a,b)=>inv(b)-inv(a),'inv-asc':(a,b)=>inv(a)-inv(b),'precio-desc':(a,b)=>b.ahora-a.ahora,'precio-asc':(a,b)=>a.ahora-b.ahora,'dcto-desc':(a,b)=>b.desc-a.desc}[orden];
    if(cmp) lista=lista.slice().sort(cmp);
  }
  return lista;
}
function cambiarOrden(v){ orden=v; pagina=1; pintar(); }

function pintar(){
  if(seccion==='seguimiento'){ pintarSeguimiento(); return; }
  const lista=filtrar();
  const cont=document.getElementById('contenido'), est=document.getElementById('estado'), total=lista.length;
  const uni=lista.reduce((a,p)=>a+invVisible(p).total,0);
  document.getElementById('stProd').textContent=miles(total);
  document.getElementById('stTie').textContent=miles(SELEC.size?SELEC.size:ALMACENES.length);
  document.getElementById('stUni').textContent=miles(uni);
  document.getElementById('conteo').innerHTML='<b>'+miles(total)+'</b> producto'+(total===1?'':'s')+(SELEC.size?' · '+miles(uni)+' und en la selección':'');
  if(total===0){ cont.innerHTML=''; est.style.display='block'; est.textContent='No hay productos con estos filtros.'; document.getElementById('paginacion').hidden=true; return; }
  est.style.display='none';
  const totalPag=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(pagina>totalPag) pagina=totalPag; if(pagina<1) pagina=1;
  const ini=(pagina-1)*PAGE_SIZE, slice=lista.slice(ini,ini+PAGE_SIZE);
  cont.innerHTML='<div class="grid">'+slice.map(p=>tarjeta(p)).join('')+'</div>';
  renderPaginacion(total,totalPag,ini);
}
function renderPaginacion(total,totalPag,ini){
  const nav=document.getElementById('paginacion');
  if(total<=PAGE_SIZE){ nav.hidden=true; return; }
  nav.hidden=false;
  document.getElementById('pgPrev').disabled=pagina<=1; document.getElementById('pgNext').disabled=pagina>=totalPag;
  const inp=document.getElementById('pgInput'); inp.value=pagina; inp.max=totalPag;
  document.getElementById('pgTotal').textContent=miles(totalPag);
  const desde=ini+1, hasta=Math.min(ini+PAGE_SIZE,total);
  document.getElementById('pgRango').innerHTML='<b>'+miles(desde)+'–'+miles(hasta)+'</b> de '+miles(total);
}
function irAPagina(n){ pagina=n; pintar(); window.scrollTo({top:0,behavior:'smooth'}); }

function detalleSublinea(t){
  const m={}; let tot=0;
  TODOS.forEach(p=>{ const q=p.tiendas[t]||0; if(q>0){ const s=p.sublinea||'(Sin sublínea)'; m[s]=(m[s]||0)+q; tot+=q; } });
  const arr=Object.entries(m).sort((a,b)=>b[1]-a[1]);
  if(!arr.length) return '<div class="seg-empty">Sin inventario actual en este almacén.</div>';
  return '<table class="subt"><thead><tr><th>Sublínea</th><th>Unidades</th><th>Participación</th></tr></thead><tbody>'+
    arr.map(e=>{ const pct=tot>0?Math.round(e[1]/tot*100):0; return '<tr><td>'+esc(e[0])+'</td><td>'+miles(e[1])+'</td><td><span class="bar mini"><i style="width:'+pct+'%"></i></span><span class="pctxt">'+pct+'%</span></td></tr>'; }).join('')+
    '</tbody></table>';
}
function toggleSeg(row){ const det=row.nextElementSibling; if(det&&det.classList.contains('seg-det')){ det.hidden=!det.hidden; row.classList.toggle('abierto',!det.hidden); } }

function pintarSeguimiento(){
  const cont=document.getElementById('contenido');
  document.getElementById('estado').style.display='none'; document.getElementById('paginacion').hidden=true;
  if(!BASE_OK){
    cont.innerHTML='<div class="seg-info">Para activar el <b>Seguimiento de evacuación</b>:<br>1) En tu Google Sheet crea una pestaña <b>Base</b> con el inventario inicial (mismo formato que Inventario: código en la 1ª columna, almacén y cantidad).<br>2) Comparte la hoja y listo: aquí verás cuántas unidades se han evacuado y el % de avance por tienda.</div>';
    return;
  }
  const filas=ALMACENES.map(t=>{ const base=INVBASE[t]||0, act=INVACT[t]||0, evac=Math.max(0,base-act); const pct=base>0?Math.round(evac/base*100):0; return {t,base,act,evac,pct}; });
  filas.sort((a,b)=>b.act-a.act);
  let tBase=0,tAct=0,tEvac=0; filas.forEach(f=>{tBase+=f.base;tAct+=f.act;tEvac+=f.evac;});
  const pctG=tBase>0?Math.round(tEvac/tBase*100):0;
  let html='<div class="seg-sum">'+
    '<div class="seg-card"><b>'+miles(tBase)+'</b><span>Inventario base (inicial)</span></div>'+
    '<div class="seg-card"><b>'+miles(tEvac)+'</b><span>Unidades evacuadas</span></div>'+
    '<div class="seg-card"><b>'+pctG+'%</b><span>Avance de evacuación</span></div>'+
    '<div class="seg-card"><b>'+miles(tAct)+'</b><span>Inventario actual</span></div></div>';
  html+='<div class="seg-hint">Ordenado por inventario actual. Haz clic en un almacén para ver el desglose por sublínea.</div>';
  html+='<table class="seg"><thead><tr><th>Almacén</th><th>Inv. base</th><th>Inv. actual</th><th>Evacuadas</th><th>% avance</th></tr></thead><tbody>'+
    filas.map(f=>'<tr class="seg-row" onclick="toggleSeg(this)"><td><span class="caret">▸</span>'+esc(f.t)+'</td><td>'+miles(f.base)+'</td><td>'+miles(f.act)+'</td><td>'+miles(f.evac)+'</td><td><span class="bar"><i style="width:'+f.pct+'%"></i></span><span class="pctxt">'+f.pct+'%</span></td></tr>'+
      '<tr class="seg-det" hidden><td colspan="5">'+detalleSublinea(f.t)+'</td></tr>').join('')+
    '</tbody><tfoot><tr><td>Total</td><td>'+miles(tBase)+'</td><td>'+miles(tAct)+'</td><td>'+miles(tEvac)+'</td><td>'+pctG+'%</td></tr></tfoot></table>';
  cont.innerHTML=html;
}

function cambiarSeccion(s){
  seccion=s;
  document.getElementById('secProd').classList.toggle('activo',s==='productos');
  document.getElementById('secSeg').classList.toggle('activo',s==='seguimiento');
  const prod=s==='productos';
  document.getElementById('toolbar').hidden=!prod;
  document.getElementById('conteo').hidden=!prod;
  pintar();
}

function cargar(){
  Promise.all([leerTab(GID_PRODUCTOS),leerTab(GID_PROD_EXTRA),leerTab(GID_PRECIOS),leerTab(GID_INVENTARIO),leerTab(GID_FOTOS),leerTab(GID_BASE)]).then(function(res){
    const prod1=res[0],prod2=res[1],prec=res[2],inv=res[3],fotos=res[4],base=res[5];
    const mPrec={};
    prec.rows.forEach(r=>{ const c=codigo(prec.code?r[prec.code]:Object.values(r)[0]); if(!c) return;
      mPrec[c]={lista:num(campo(r,COL_LISTA,'Lista Costa 1','Lista')),precio:num(campo(r,COL_PRECIO,'Oferta Costa 1','Precio','Oferta')),dcto:descPct(num(campo(r,COL_DESCUENTO,'Dcto Costa 1','Descuento','Dcto'))),nombre:campo(r,'Nombre Producto','Nombre del producto','Nombre')}; });
    const mFoto={};
    fotos.rows.forEach(r=>{ const c=codigo(fotos.code?r[fotos.code]:Object.values(r)[0]); if(!c) return;
      mFoto[c]={nombre:campo(r,COL_NOMBRE,'Nombre'),sublinea:campo(r,COL_SUBLINEA,'Sublinea','Sublínea','Sub linea'),foto:campo(r,COL_FOTO,'Foto','Imagen','Image')}; });
    const mInv={}; const setAlm=new Set();
    inv.rows.forEach(r=>{ const c=codigo(inv.code?r[inv.code]:Object.values(r)[0]); if(!c) return;
      const q=num(campo(r,COL_CANTIDAD,'Libre utilización','Libre utilizacion','Cantidad','Stock','Existencias'));
      const t=campo(r,COL_TIENDA,'Nombre 1','Tienda','Centro','Almacén','Almacen');
      if(!mInv[c]) mInv[c]={total:0,tiendas:{}};
      mInv[c].total+=q; if(t){ mInv[c].tiendas[t]=(mInv[c].tiendas[t]||0)+q; setAlm.add(t); } });
    ALMACENES=[...setAlm].sort();

    const setSub=new Set(), setTag=new Set(), vistos={};
    function tagsDe(r){ const s=campo(r,COL_TAGS,'Tags','Etiquetas','Tag'); return s?s.split(/[;,/]/).map(x=>x.trim()).filter(Boolean):[]; }
    function agregar(tab){ tab.rows.forEach(r=>{ const c=codigo(tab.code?r[tab.code]:Object.values(r)[0]); if(!c||vistos[c]) return; vistos[c]=1;
      const pr=mPrec[c]||{},fo=mFoto[c]||{},iv=mInv[c]||{total:0,tiendas:{}};
      const nombre=fo.nombre||pr.nombre||campo(r,'NOMBRE DEL PRODUCTO','Nombre del producto','Nombre')||c;
      const sublinea=campo(r,COL_SUBLINEA,'Sublinea','Sublínea','Sub linea')||fo.sublinea||''; if(sublinea) setSub.add(sublinea);
      const tags=tagsDe(r); tags.forEach(t=>setTag.add(t));
      const ahora=pr.precio||0,dcto=pr.dcto||0;
      const antes=(pr.lista&&pr.lista>0)?pr.lista:((ahora&&dcto>0&&dcto<100)?ahora/(1-dcto/100):0);
      const p={codigo:c,nombre,sublinea,tags,foto:urlFoto(fo.foto),ahora,antes,desc:dcto,inv:iv.total,tiendas:iv.tiendas};
      p.busq=textoBusq(p); TODOS.push(p); }); }
    agregar(prod1); agregar(prod2);
    SUBLINEAS=[...setSub].sort(); ALLTAGS=[...setTag].sort();

    const codSet={}; TODOS.forEach(p=>codSet[p.codigo]=1);
    INVACT={}; TODOS.forEach(p=>{ Object.entries(p.tiendas).forEach(e=>{ INVACT[e[0]]=(INVACT[e[0]]||0)+e[1]; }); });
    INVBASE={}; let baseRows=0;
    base.rows.forEach(r=>{ const c=codigo(base.code?r[base.code]:Object.values(r)[0]); if(!c||!codSet[c]) return;
      const q=num(campo(r,COL_CANTIDAD,'Libre utilización','Libre utilizacion','Cantidad','Stock','Existencias'));
      const t=campo(r,COL_TIENDA,'Nombre 1','Tienda','Centro','Almacén','Almacen');
      if(t){ INVBASE[t]=(INVBASE[t]||0)+q; baseRows++; } });
    BASE_OK = baseRows>0;

    if(TODOS.length===0){ document.getElementById('estado').innerHTML='No se pudieron leer los productos. Verifica que la hoja esté compartida como "Cualquiera con el enlace → Lector".'; return; }
    mkList('msLista',ALMACENES,'onCheck'); mkList('subLista',SUBLINEAS,'onCheckSub'); mkList('tagLista',ALLTAGS,'onCheckTag');
    if(ALLTAGS.length===0) document.getElementById('chipTag').style.display='none';
    updateChips(); pintar();
  });
}

document.getElementById('logo').textContent=LOGO_LETRA;
document.addEventListener('click',cerrarPops);
document.getElementById('buscar').addEventListener('input',function(){ pagina=1; pintar(); });
cargar();
</script>
