<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquidación Jamar</title>

<!-- ========================================================= -->
<!--  CONFIGURACIÓN                                             -->
<!--  La página lee 5 pestañas de tu Google Sheet y las une    -->
<!--  por el CÓDIGO, que siempre está en la PRIMERA columna.   -->
<!-- ========================================================= -->
<script>
  const SHEET_ID = "1Zvf017OwhwKMb7_0NEKvhU0PnegumNCLUilMh63pM7U";

  // gid (número) de cada pestaña:
  const GID_60         = "488240662";    // Liquidación 60%
  const GID_30         = "911640390";    // Liquidación 30%
  const GID_PRECIOS    = "1086284473";   // Precio
  const GID_INVENTARIO = "1787664807";   // Inventario
  const GID_FOTOS      = "0";            // Hoja 1 (fotos / nombre)

  // Nombres de columnas (si algún día cambian los títulos, ajústalos aquí):
  const COL_PRECIO    = "Oferta Costa 1";        // hoja Precio
  const COL_DESCUENTO = "Dcto Costa 1";          // hoja Precio
  const COL_CANTIDAD  = "Libre utilización";     // hoja Inventario
  const COL_TIENDA    = "Nombre 1";              // hoja Inventario
  const COL_NOMBRE    = "Nombre";                // Hoja 1
  const COL_FOTO      = "Foto";                  // Hoja 1

  function urlCSV(gid){
    return "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/export?format=csv&gid="+gid;
  }
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
  :root{
    --rojo:#e3000f;
    --rojo-osc:#b8000c;
    --gris:#f4f5f7;
    --texto:#222;
    --tenue:#777;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:var(--gris);color:var(--texto)}
  header{background:var(--rojo);color:#fff;padding:18px 16px;text-align:center}
  header h1{font-size:1.5rem;letter-spacing:.5px}
  header p{font-size:.9rem;opacity:.9;margin-top:4px}

  .controles{max-width:1200px;margin:0 auto;padding:14px 16px 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .controles input,.controles select{padding:10px 12px;border:1px solid #ccc;border-radius:8px;font-size:.95rem}
  .controles input{flex:1;min-width:180px}

  .tabs{max-width:1200px;margin:14px auto 0;padding:0 16px;display:flex;gap:8px}
  .tab{flex:1;padding:14px;border:none;border-radius:10px 10px 0 0;background:#e4e6ea;color:#444;font-size:1rem;font-weight:600;cursor:pointer;transition:.15s}
  .tab small{display:block;font-weight:400;font-size:.78rem;opacity:.8}
  .tab.activo{background:var(--rojo);color:#fff}

  .grid{max-width:1200px;margin:0 auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.08);display:flex;flex-direction:column}
  .card .foto{position:relative;aspect-ratio:1/1;background:#eee;overflow:hidden}
  .card .foto img{width:100%;height:100%;object-fit:cover}
  .badge{position:absolute;top:8px;left:8px;background:var(--rojo);color:#fff;font-weight:700;font-size:.85rem;padding:5px 9px;border-radius:20px}
  .card .info{padding:12px;display:flex;flex-direction:column;gap:6px;flex:1}
  .card .nombre{font-weight:600;font-size:.98rem;line-height:1.25}
  .card .ref{font-size:.75rem;color:var(--tenue)}
  .precios{margin-top:auto}
  .antes{color:var(--tenue);text-decoration:line-through;font-size:.85rem}
  .ahora{color:var(--rojo);font-weight:700;font-size:1.25rem}
  .meta{display:flex;justify-content:space-between;font-size:.8rem;color:#555;border-top:1px solid #eee;padding-top:8px;margin-top:4px}
  .inv{font-weight:600}
  .inv.bajo{color:var(--rojo)}

  .estado{text-align:center;padding:50px 20px;color:var(--tenue);font-size:1rem}
  footer{text-align:center;padding:18px;color:var(--tenue);font-size:.8rem}
  @media(max-width:480px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
    .tab{font-size:.85rem}
  }
</style>
</head>
<body>

<header>
  <h1>🛋️ Liquidación Jamar</h1>
  <p>Productos en liquidación de todas las tiendas</p>
</header>

<div class="controles">
  <input id="buscar" type="text" placeholder="Buscar producto o código...">
  <select id="filtroTienda"><option value="">Todas las tiendas</option></select>
</div>

<div class="tabs">
  <button class="tab activo" id="tabAlto" onclick="cambiarTab('alto')">
    Liquidación 60% <small>60% o más</small>
  </button>
  <button class="tab" id="tabBajo" onclick="cambiarTab('bajo')">
    Liquidación 30% <small>otros descuentos</small>
  </button>
</div>

<div id="grid" class="grid"></div>
<div id="estado" class="estado">Cargando productos…</div>

<footer>Página de liquidaciones · Jamar</footer>

<script>
let TODOS = [];
let tabActual = 'alto';
const IMG_GENERICA = 'placeholder.svg';

// ---- utilidades ----
function num(v){ if(v==null) return 0; const n=parseFloat(String(v).replace(/[^0-9.,-]/g,'').replace(/\./g,'').replace(',','.')); return isNaN(n)?0:n; }
function pesos(v){ return v ? '$'+Math.round(v).toLocaleString('es-CO') : ''; }
function codigo(v){ return String(v||'').trim().toUpperCase(); }
function descPct(d){ if(d>0 && d<=1) return Math.round(d*100); return Math.round(d); }

// busca un valor en la fila por nombre de columna, sin importar mayúsculas/acentos
function campo(fila, ...nombres){
  const claves = Object.keys(fila);
  const limpio = s => String(s).trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  for(const n of nombres){
    const k = claves.find(c => limpio(c) === limpio(n));
    if(k!=null && fila[k]!=null && String(fila[k]).trim()!=='') return String(fila[k]).trim();
  }
  return '';
}

function urlFoto(valor){
  if(!valor) return IMG_GENERICA;
  if(/^https?:\/\//i.test(valor)) return valor;     // es un link completo
  return 'fotos/' + valor;                            // es un nombre de archivo en la carpeta fotos/
}

// lee una pestaña como CSV y devuelve {rows, code} (code = título de la 1ª columna)
function leerTab(gid){
  return new Promise((resolve)=>{
    Papa.parse(urlCSV(gid),{
      download:true, header:true, skipEmptyLines:true,
      complete:(r)=> resolve({ rows:r.data, code:(r.meta.fields&&r.meta.fields[0])||null }),
      error:()=> resolve({ rows:[], code:null })
    });
  });
}

function tarjeta(p, tiendaSel){
  let invNum, etiqueta;
  if(tiendaSel){ invNum = p.tiendas[tiendaSel]||0; etiqueta = tiendaSel; }
  else { invNum = p.inv; const n=Object.keys(p.tiendas).length; etiqueta = n? (n+(n===1?' tienda':' tiendas')) : ''; }
  const invBajo = invNum>0 && invNum<=3 ? 'bajo' : '';
  const invTxt = invNum>0 ? invNum+' und' : 'Sin dato';
  return `
  <div class="card">
    <div class="foto">
      ${p.desc?`<span class="badge">-${p.desc}%</span>`:''}
      <img src="${p.foto}" alt="${p.nombre}" loading="lazy" onerror="this.onerror=null;this.src='${IMG_GENERICA}'">
    </div>
    <div class="info">
      <div class="nombre">${p.nombre}</div>
      ${p.codigo?`<div class="ref">Cód: ${p.codigo}</div>`:''}
      <div class="precios">
        ${p.antes?`<div class="antes">${pesos(p.antes)}</div>`:''}
        <div class="ahora">${pesos(p.ahora)||'—'}</div>
      </div>
      <div class="meta">
        <span>${etiqueta}</span>
        <span class="inv ${invBajo}">${invTxt}</span>
      </div>
    </div>
  </div>`;
}

function cambiarTab(t){
  tabActual=t;
  document.getElementById('tabAlto').classList.toggle('activo',t==='alto');
  document.getElementById('tabBajo').classList.toggle('activo',t==='bajo');
  pintar();
}

function pintar(){
  const q = document.getElementById('buscar').value.toLowerCase().trim();
  const tienda = document.getElementById('filtroTienda').value;
  let lista = TODOS.filter(p => p.origen===tabActual);
  if(tienda) lista = lista.filter(p => (p.tiendas[tienda]||0) > 0);
  if(q) lista = lista.filter(p => (p.nombre+' '+p.codigo).toLowerCase().includes(q));

  const grid=document.getElementById('grid'), est=document.getElementById('estado');
  if(lista.length===0){ grid.innerHTML=''; est.style.display='block'; est.textContent='No hay productos para mostrar en este filtro.'; return; }
  est.style.display='none';
  grid.innerHTML = lista.map(p=>tarjeta(p,tienda)).join('');
}

function llenarTiendas(){
  const sel=document.getElementById('filtroTienda');
  const set=new Set();
  TODOS.forEach(p=>Object.keys(p.tiendas).forEach(t=>set.add(t)));
  [...set].sort().forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=t; sel.appendChild(o); });
}

function cargar(){
  Promise.all([
    leerTab(GID_60), leerTab(GID_30), leerTab(GID_PRECIOS), leerTab(GID_INVENTARIO), leerTab(GID_FOTOS)
  ]).then(([liq60, liq30, prec, inv, fotos])=>{

    // --- mapa de PRECIOS (código -> precio, descuento, nombre) ---
    const mPrec={};
    prec.rows.forEach(r=>{ const c=codigo(prec.code?r[prec.code]:Object.values(r)[0]); if(!c) return;
      mPrec[c]={ precio:num(campo(r,COL_PRECIO,'Oferta Costa 1','Precio','Oferta')),
                 dcto: descPct(num(campo(r,COL_DESCUENTO,'Dcto Costa 1','Descuento','Dcto'))),
                 nombre: campo(r,'Nombre Producto','Nombre del producto','Nombre') }; });

    // --- mapa de FOTOS / nombre (Hoja 1) ---
    const mFoto={};
    fotos.rows.forEach(r=>{ const c=codigo(fotos.code?r[fotos.code]:Object.values(r)[0]); if(!c) return;
      mFoto[c]={ nombre:campo(r,COL_NOMBRE,'Nombre'), foto:campo(r,COL_FOTO,'Foto','Imagen','Image') }; });

    // --- mapa de INVENTARIO (suma por código + detalle por tienda) ---
    const mInv={};
    inv.rows.forEach(r=>{ const c=codigo(inv.code?r[inv.code]:Object.values(r)[0]); if(!c) return;
      const q=num(campo(r,COL_CANTIDAD,'Libre utilización','Libre utilizacion','Cantidad','Stock','Existencias'));
      const t=campo(r,COL_TIENDA,'Nombre 1','Tienda','Centro','Almacén','Almacen');
      if(!mInv[c]) mInv[c]={total:0,tiendas:{}};
      mInv[c].total+=q;
      if(t){ mInv[c].tiendas[t]=(mInv[c].tiendas[t]||0)+q; }
    });

    // --- construir productos a partir de las pestañas de liquidación ---
    function construir(tab, origen){
      return tab.rows.map(r=>{
        const c=codigo(tab.code?r[tab.code]:Object.values(r)[0]); if(!c) return null;
        const pr=mPrec[c]||{}, fo=mFoto[c]||{}, iv=mInv[c]||{total:0,tiendas:{}};
        const nombre = fo.nombre || pr.nombre || campo(r,'NOMBRE DEL PRODUCTO','Nombre del producto','Nombre') || c;
        const ahora = pr.precio||0;
        const dcto  = pr.dcto||0;
        const antes = (ahora && dcto>0 && dcto<100) ? ahora/(1-dcto/100) : 0;
        return { codigo:c, nombre, foto:urlFoto(fo.foto), ahora, antes, desc:dcto, inv:iv.total, tiendas:iv.tiendas, origen };
      }).filter(Boolean);
    }

    TODOS = construir(liq60,'alto').concat(construir(liq30,'bajo'));

    if(TODOS.length===0){
      document.getElementById('estado').innerHTML='No se pudieron leer los productos. Verifica que la hoja esté compartida como “Cualquiera con el enlace → Lector” y que los gid sean correctos.';
      return;
    }
    llenarTiendas();
    pintar();
  });
}

document.getElementById('buscar').addEventListener('input',pintar);
document.getElementById('filtroTienda').addEventListener('change',pintar);
cargar();
</script>
</body>
</html>
